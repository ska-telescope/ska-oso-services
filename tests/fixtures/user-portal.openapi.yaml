# Snapshot of external user portal OpenAPI spec used for local Prism-backed tests.
# Authoritative source (manual update only, no auto-sync):
# https://gitlab.com/ska-telescope/sdi/ska-ser-user-portal-backend/-/raw/8672d0c7268d7fe4c3e0a4a7834fa5927cbcfccc/docs/external-openapi.json

components:
  schemas:
    ExternalGroupCard:
      properties:
        created_at:
          format: date-time
          title: Created At
          type: string
        display_name:
          title: Display Name
          type: string
        group_name:
          title: Group Name
          type: string
        iam_group_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Iam Group Id
        owner_iam_sub:
          title: Owner Iam Sub
          type: string
        status:
          title: Status
          type: string
      required:
      - group_name
      - display_name
      - status
      - iam_group_id
      - owner_iam_sub
      - created_at
      title: ExternalGroupCard
      type: object
    ExternalGroupCreateRequest:
      properties:
        display_name:
          maxLength: 256
          minLength: 1
          title: Display Name
          type: string
        group_name:
          maxLength: 128
          minLength: 1
          pattern: ^[A-Za-z0-9._/-]+$
          title: Group Name
          type: string
      required:
      - group_name
      - display_name
      title: ExternalGroupCreateRequest
      type: object
    ExternalGroupDeleteResponse:
      properties:
        status:
          title: Status
          type: string
      required:
      - status
      title: ExternalGroupDeleteResponse
      type: object
    ExternalGroupMember:
      properties:
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
        iam_user_id:
          title: Iam User Id
          type: string
        portal_user_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Portal User Id
      required:
      - portal_user_id
      - iam_user_id
      - display_name
      title: ExternalGroupMember
      type: object
    ExternalGroupMembersResponse:
      properties:
        as_of:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: As Of
        members:
          items:
            $ref: '#/components/schemas/ExternalGroupMember'
          title: Members
          type: array
        stale:
          title: Stale
          type: boolean
      required:
      - members
      - as_of
      - stale
      title: ExternalGroupMembersResponse
      type: object
    ExternalInviteCard:
      properties:
        accepted_via:
          anyOf:
          - type: string
          - type: 'null'
          title: Accepted Via
        claim_state:
          title: Claim State
          type: string
        claimed_by_portal_user_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Claimed By Portal User Id
        created_at:
          format: date-time
          title: Created At
          type: string
        email_mismatch:
          title: Email Mismatch
          type: boolean
        expires_at:
          format: date-time
          title: Expires At
          type: string
        group_name:
          title: Group Name
          type: string
        invite_id:
          format: uuid
          title: Invite Id
          type: string
        invited_by:
          title: Invited By
          type: string
        invited_email:
          title: Invited Email
          type: string
        responded_at:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Responded At
        status:
          title: Status
          type: string
        updated_at:
          format: date-time
          title: Updated At
          type: string
      required:
      - invite_id
      - group_name
      - invited_email
      - invited_by
      - status
      - claim_state
      - accepted_via
      - email_mismatch
      - claimed_by_portal_user_id
      - created_at
      - updated_at
      - expires_at
      - responded_at
      title: ExternalInviteCard
      type: object
    ExternalInviteCreateRequest:
      description: "Invite by ``portal_user_id`` (preferred) or by raw ``email``.\n\
        \nSupply at least one; ``portal_user_id`` wins when both are present. It is\
        \ the\nsame ``portal_user_id`` Search/Look-up return (``user_records.id``)\
        \ and is\nresolved server-side to that account's contact email \u2014 the\
        \ invite is keyed on\nemail either way, so a ``portal_user_id`` and its matching\
        \ address are\ninterchangeable. ``email`` is the fallback for someone with\
        \ no portal account\nyet (Search returned ``portal_user_id: null``, or no\
        \ hit at all).\n\nNote ``portal_user_id`` \u2014 not ``iam_user_id``: the\
        \ portal id spans the whole\nonboarding lifecycle, whereas a user has no INDIGO\
        \ id until provisioned."
      properties:
        email:
          anyOf:
          - format: email
            type: string
          - type: 'null'
          title: Email
        portal_user_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Portal User Id
      title: ExternalInviteCreateRequest
      type: object
    ExternalInviteListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/ExternalInviteCard'
          title: Items
          type: array
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
      required:
      - items
      - next_cursor
      title: ExternalInviteListResponse
      type: object
    ExternalInviteRevokeResponse:
      properties:
        status:
          title: Status
          type: string
      required:
      - status
      title: ExternalInviteRevokeResponse
      type: object
    ExternalMemberRemoveResponse:
      properties:
        status:
          title: Status
          type: string
      required:
      - status
      title: ExternalMemberRemoveResponse
      type: object
    ExternalUserLookupResponse:
      properties:
        display_name:
          title: Display Name
          type: string
        has_iam_account:
          title: Has Iam Account
          type: boolean
        portal_user_id:
          format: uuid
          title: Portal User Id
          type: string
        status:
          title: Status
          type: string
      required:
      - portal_user_id
      - display_name
      - status
      - has_iam_account
      title: ExternalUserLookupResponse
      type: object
    ExternalUserSearchItem:
      properties:
        display_name:
          title: Display Name
          type: string
        email:
          title: Email
          type: string
        has_iam_account:
          title: Has Iam Account
          type: boolean
        portal_user_id:
          anyOf:
          - format: uuid
            type: string
          - type: 'null'
          title: Portal User Id
        status:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      required:
      - portal_user_id
      - display_name
      - email
      - status
      - has_iam_account
      title: ExternalUserSearchItem
      type: object
    ExternalUserSearchResponse:
      properties:
        results:
          items:
            $ref: '#/components/schemas/ExternalUserSearchItem'
          title: Results
          type: array
      required:
      - results
      title: ExternalUserSearchResponse
      type: object
    ExternalUserStatusResponse:
      properties:
        portal_user_id:
          format: uuid
          title: Portal User Id
          type: string
        status:
          title: Status
          type: string
      required:
      - portal_user_id
      - status
      title: ExternalUserStatusResponse
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
info:
  title: "SKAO User Portal \u2014 External (SV Ideas) API"
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/external/v1/groups:
    post:
      operationId: create_group_api_external_v1_groups_post
      parameters:
      - in: header
        name: X-Acting-User
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Acting-User
      - in: header
        name: authorization
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - in: header
        name: Idempotency-Key
        required: false
        schema:
          anyOf:
          - maxLength: 128
            type: string
          - type: 'null'
          title: Idempotency-Key
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExternalGroupCreateRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalGroupCard'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Create Group
      tags:
      - external-sv-ideas
  /api/external/v1/groups/{group_name}:
    delete:
      operationId: delete_group_api_external_v1_groups__group_name__delete
      parameters:
      - in: path
        name: group_name
        required: true
        schema:
          title: Group Name
          type: string
      - in: header
        name: X-Acting-User
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Acting-User
      - in: header
        name: authorization
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalGroupDeleteResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Delete Group
      tags:
      - external-sv-ideas
    get:
      operationId: get_group_api_external_v1_groups__group_name__get
      parameters:
      - in: path
        name: group_name
        required: true
        schema:
          title: Group Name
          type: string
      - in: header
        name: authorization
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalGroupCard'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Group
      tags:
      - external-sv-ideas
  /api/external/v1/groups/{group_name}/invites:
    post:
      operationId: create_invite_api_external_v1_groups__group_name__invites_post
      parameters:
      - in: path
        name: group_name
        required: true
        schema:
          title: Group Name
          type: string
      - in: header
        name: X-Acting-User
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Acting-User
      - in: header
        name: authorization
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - in: header
        name: Idempotency-Key
        required: false
        schema:
          anyOf:
          - maxLength: 128
            type: string
          - type: 'null'
          title: Idempotency-Key
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExternalInviteCreateRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalInviteCard'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Create Invite
      tags:
      - external-sv-ideas
  /api/external/v1/groups/{group_name}/members:
    get:
      operationId: list_members_api_external_v1_groups__group_name__members_get
      parameters:
      - in: path
        name: group_name
        required: true
        schema:
          title: Group Name
          type: string
      - in: header
        name: authorization
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalGroupMembersResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List Members
      tags:
      - external-sv-ideas
  /api/external/v1/groups/{group_name}/members/{portal_user_id}:
    delete:
      operationId: remove_member_api_external_v1_groups__group_name__members__portal_user_id__delete
      parameters:
      - in: path
        name: group_name
        required: true
        schema:
          title: Group Name
          type: string
      - in: path
        name: portal_user_id
        required: true
        schema:
          format: uuid
          title: Portal User Id
          type: string
      - in: header
        name: X-Acting-User
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Acting-User
      - in: header
        name: authorization
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalMemberRemoveResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Remove Member
      tags:
      - external-sv-ideas
  /api/external/v1/invites:
    get:
      description: "At-least-once keyset feed over (updated_at, id) ascending.\n\n\
        Rows only become visible once their updated_at is at least\n``FEED_VISIBILITY_LAG_SECONDS``\
        \ in the past (a row committed concurrently\nwith a page read could otherwise\
        \ land *behind* an already-served cursor\nposition and be skipped permanently).\
        \ Delivery is at-least-once \u2014 any update\nre-delivers the row at its\
        \ new feed position \u2014 so consumers must treat items\nidempotently. ``invited_by``\
        \ scopes the feed to one PI's invites (the\n\"all my pending / expired invites\"\
        \ view)."
      operationId: list_invites_api_external_v1_invites_get
      parameters:
      - in: query
        name: updated_since
        required: false
        schema:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          title: Updated Since
      - in: query
        name: group_name
        required: false
        schema:
          anyOf:
          - maxLength: 128
            type: string
          - type: 'null'
          title: Group Name
      - description: IAM sub of the inviting PI (a PI's own invites).
        in: query
        name: invited_by
        required: false
        schema:
          anyOf:
          - maxLength: 64
            type: string
          - type: 'null'
          description: IAM sub of the inviting PI (a PI's own invites).
          title: Invited By
      - in: query
        name: status
        required: false
        schema:
          anyOf:
          - pattern: ^(pending|accepted|rejected|expired|revoked)$
            type: string
          - type: 'null'
          title: Status
      - in: query
        name: cursor
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - in: query
        name: limit
        required: false
        schema:
          default: 25
          minimum: 1
          title: Limit
          type: integer
      - in: header
        name: authorization
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalInviteListResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List Invites
      tags:
      - external-sv-ideas
  /api/external/v1/invites/{invite_id}:
    delete:
      operationId: revoke_invite_api_external_v1_invites__invite_id__delete
      parameters:
      - in: path
        name: invite_id
        required: true
        schema:
          format: uuid
          title: Invite Id
          type: string
      - in: header
        name: X-Acting-User
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Acting-User
      - in: header
        name: authorization
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalInviteRevokeResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Revoke Invite
      tags:
      - external-sv-ideas
    get:
      operationId: get_invite_api_external_v1_invites__invite_id__get
      parameters:
      - in: path
        name: invite_id
        required: true
        schema:
          format: uuid
          title: Invite Id
          type: string
      - in: header
        name: authorization
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalInviteCard'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Invite
      tags:
      - external-sv-ideas
  /api/external/v1/users/lookup:
    get:
      operationId: lookup_user_api_external_v1_users_lookup_get
      parameters:
      - in: query
        name: email
        required: true
        schema:
          maxLength: 320
          minLength: 3
          title: Email
          type: string
      - in: header
        name: authorization
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalUserLookupResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Lookup User
      tags:
      - external-sv-ideas
  /api/external/v1/users/search:
    get:
      description: 'Fuzzy search over the identity provider (Entra), enriched with
        portal records.


        Mirrors the SciOps admin search. The match runs over directory name + email;

        each result carries the contact ``email`` so the consumer can drive the invite

        workflow, ``portal_user_id`` (null for a directory user with no portal record),

        ``status`` and ``has_iam_account``. Results are capped at ``limit``.'
      operationId: search_users_api_external_v1_users_search_get
      parameters:
      - description: Free-text match over name + email.
        in: query
        name: q
        required: true
        schema:
          description: Free-text match over name + email.
          maxLength: 256
          minLength: 2
          title: Q
          type: string
      - in: query
        name: limit
        required: false
        schema:
          default: 25
          maximum: 100
          minimum: 1
          title: Limit
          type: integer
      - in: header
        name: authorization
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalUserSearchResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Search Users
      tags:
      - external-sv-ideas
  /api/external/v1/users/{portal_user_id}/status:
    get:
      operationId: user_status_api_external_v1_users__portal_user_id__status_get
      parameters:
      - in: path
        name: portal_user_id
        required: true
        schema:
          format: uuid
          title: Portal User Id
          type: string
      - in: header
        name: authorization
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalUserStatusResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: User Status
      tags:
      - external-sv-ideas
