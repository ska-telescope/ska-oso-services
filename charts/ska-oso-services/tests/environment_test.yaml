---
suite: ska-oso-services-environment
templates:
  - environment.yaml
tests:
  - it: should contain only one document.
    asserts:
      - hasDocuments:
          count: 1

  - it: should set PIPELINE_TESTS_DEPLOYMENT to false.
    asserts:
      - equal:
          path: data.PIPELINE_TESTS_DEPLOYMENT
          value:
            "false"

  - it: should set SKA_AUTH_AUDIENCE with Indigo and Entra audiences.
    asserts:
      - equal:
          path: data.SKA_AUTH_AUDIENCE
          value: "test:pht,test:odt,api://e4d6bb9b-cdd0-46c4-b30a-d045091b501b"

  - it: should be of type ConfigMap and have the correct apiVersion, v1.
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - isAPIVersion:
          of: v1
